<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Outreach CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; padding: 1rem; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    .card { background: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 0.75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    label { display: block; margin-bottom: 0.25rem; font-weight: 500; font-size: 0.875rem; }
    input, select, textarea { width: 100%; padding: 0.625rem; margin-bottom: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; background: #fff; }
    textarea { min-height: 100px; font-size: 0.8rem; resize: vertical; line-height: 1.4; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    button { width: 100%; padding: 0.75rem; border: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-green { background: #10b981; color: #fff; }
    .btn-green:hover { background: #059669; }
    .btn-orange { background: #f97316; color: #fff; }
    .btn-orange:hover { background: #ea580c; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-red:hover { background: #dc2626; }
    .msg { padding: 0.5rem 0.75rem; border-radius: 6px; margin-top: 0.5rem; font-size: 0.875rem; display: none; }
    .msg.ok { display: block; background: #d1fae5; color: #065f46; }
    .msg.err { display: block; background: #fee2e2; color: #991b1b; }
    .row { display: flex; gap: 0.5rem; }
    .row > div { flex: 1; }
    .hint { font-size: 0.75rem; color: #6b7280; margin-top: -0.5rem; margin-bottom: 0.75rem; }
    .divider { height: 1px; background: #e5e7eb; margin: 1rem 0; }
    #logsContent { background: #f9fafb; padding: 0.75rem; border-radius: 6px; font-size: 0.75rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    #csvOutput { background: #1e1e1e; color: #d4d4d4; padding: 0.75rem; border-radius: 6px; font-size: 0.7rem; max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.4; margin: 0; font-family: 'Consolas', 'Monaco', monospace; }

    @media (min-width: 900px) {
      body { padding: 1rem; overflow: hidden; }
      .container { max-width: 100%; display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr); gap: 1rem; height: calc(100vh - 2rem); }
      .left-panel .card { margin-bottom: 0; display: flex; flex-direction: column; height: 100%; }
      .left-panel h1 { font-size: 1.25rem; margin-bottom: 0.75rem; }
      .left-panel form { display: flex; flex-direction: column; flex: 1; }
      .left-panel .form-fields { display: flex; flex-direction: column; flex: 1; justify-content: space-evenly; }
      .left-panel .form-group { display: flex; flex-direction: column; }
      .left-panel label { margin-bottom: 0.25rem; font-size: 0.85rem; }
      .left-panel input, .left-panel select { padding: 0.625rem; font-size: 1rem; }
      .left-panel .row { gap: 0.5rem; }
      .left-panel .hint { margin: 0; font-size: 0.75rem; }
      .left-panel button { padding: 0.625rem; font-size: 0.9rem; margin-bottom: 0.75rem; }
      .left-panel .msg { margin-top: 0.25rem; margin-bottom: 0; font-size: 0.85rem; }
      .right-panel { overflow-y: auto; padding-right: 0.5rem; }
      .right-panel::-webkit-scrollbar { width: 6px; }
      .right-panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div class="card">
        <h1>CRM Entry</h1>
        <form id="entryForm">
          <div class="form-fields">
            <div class="form-group">
              <label>Company Name</label>
              <input type="text" id="company" required>
            </div>
            <div class="form-group">
              <label>WhatsApp Number</label>
              <input type="text" id="whatsapp" required>
            </div>
            <div class="form-group">
              <label>Type</label>
              <select id="type" required></select>
            </div>
            <div class="form-group">
              <label>Website URL</label>
              <input type="text" id="website" placeholder="https://example.com or example.com">
            </div>
            <div class="form-group">
              <label>Facebook Page URL</label>
              <input type="text" id="facebook" placeholder="https://facebook.com/page or facebook.com/page">
              <p class="hint">Provide either Website or Facebook URL</p>
            </div>
            <div class="form-group">
              <div class="row">
                <div>
                  <label>Sent by</label>
                  <select id="sentBy" required></select>
                </div>
                <div>
                  <label>Sent in</label>
                  <select id="sentIn" required></select>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>Message Sent</label>
              <select id="messageSent" required></select>
            </div>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">Submit</button>
          <div class="msg" id="formMsg"></div>
        </form>
      </div>
    </div>

    <div class="right-panel">
      <div class="card">
        <h1>Number Checker</h1>
        <form id="checkForm">
          <label>WhatsApp Number</label>
          <input type="text" id="checkNumber" required>
          <button type="submit" class="btn-secondary">Check</button>
          <div class="msg" id="checkMsg"></div>
        </form>
      </div>

      <div class="card">
        <h1>Auto-Sender</h1>
        <div id="autoStatus" style="margin-bottom: 0.75rem; font-size: 0.85rem;"></div>
        <button type="button" class="btn-secondary" id="viewLogsBtn">View Last 5 Logs</button>
        <div id="logsPanel" style="display:none; margin-top:0.75rem;">
          <div id="logsContent"></div>
          <button type="button" class="btn-secondary" id="closeLogsBtn" style="margin-top:0.5rem;">Close</button>
        </div>
        <div class="divider"></div>
        <button type="button" class="btn-green" id="forceCheckBtn">Force Check / Send Now</button>
        <div class="msg" id="forceMsg"></div>
      </div>

      <div class="card">
        <h1>Daily Stats</h1>
        <div id="dailyStats" style="font-size: 0.85rem; margin-bottom: 0.5rem;"></div>
        <button type="button" class="btn-secondary" id="resetDailyBtn">Reset Counter</button>
        <div class="msg" id="dailyMsg"></div>
      </div>

      <div class="card">
        <h1>CSV Importer</h1>
        <div class="row" style="gap: 0.5rem;">
          <button type="button" class="btn-orange" id="runCsvBtn">Run CSV Importer</button>
          <button type="button" class="btn-red" id="stopCsvBtn" disabled>Stop</button>
        </div>
        <div id="csvPanel" style="display:none; margin-top:0.75rem;">
          <pre id="csvOutput"></pre>
        </div>
        <div class="msg" id="csvMsg"></div>
      </div>

      <div class="card">
        <h1>Message Templates</h1>
        <div id="templatesContainer"></div>
        <div class="msg" id="templateMsg"></div>
      </div>
    </div>
  </div>

  <script>
    function cleanPhone(raw) {
      let num = raw.replace(/[\s\-]/g, '');
      const i = num.indexOf('1');
      if (i !== -1) num = num.slice(i);
      return num;
    }

    function cleanUrl(raw) {
      return raw.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '');
    }

    function showMsg(id, text, ok) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'ok' : 'err');
    }

    // Load dropdown config
    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        const type = document.getElementById('type');
        const sentBy = document.getElementById('sentBy');
        const sentIn = document.getElementById('sentIn');
        const messageSent = document.getElementById('messageSent');

        cfg.dropdowns.type.forEach(v => type.appendChild(new Option(v, v)));
        cfg.dropdowns.sentBy.forEach(v => sentBy.appendChild(new Option(v, v)));
        cfg.dropdowns.sentIn.forEach(v => sentIn.appendChild(new Option(v, v)));
        cfg.dropdowns.messageSent.forEach(v => messageSent.appendChild(new Option(v, v)));

        const saved = JSON.parse(localStorage.getItem('crm-selections') || '{}');
        if (saved.type) type.value = saved.type;
        if (saved.sentBy) sentBy.value = saved.sentBy;
        if (saved.sentIn) sentIn.value = saved.sentIn;
        if (saved.messageSent) messageSent.value = saved.messageSent;

        [type, sentBy, sentIn, messageSent].forEach(el => {
          el.addEventListener('change', persistSelections);
        });
      });

    function persistSelections() {
      const data = {
        type: document.getElementById('type').value,
        sentBy: document.getElementById('sentBy').value,
        sentIn: document.getElementById('sentIn').value,
        messageSent: document.getElementById('messageSent').value,
      };
      localStorage.setItem('crm-selections', JSON.stringify(data));
    }

    // Form submit
    document.getElementById('entryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const company = document.getElementById('company').value.trim();
      const whatsapp = cleanPhone(document.getElementById('whatsapp').value.trim());
      const type = document.getElementById('type').value;
      const website = cleanUrl(document.getElementById('website').value.trim());
      const facebook = document.getElementById('facebook').value.trim();
      const sentBy = document.getElementById('sentBy').value;
      const sentIn = document.getElementById('sentIn').value;
      const messageSent = document.getElementById('messageSent').value;

      if (!website && !facebook) {
        showMsg('formMsg', 'Provide either Website URL or Facebook URL', false);
        btn.disabled = false;
        btn.textContent = 'Submit';
        return;
      }

      const res = await fetch('/api/entry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company, whatsapp, type, website, facebook, sentBy, sentIn, messageSent }),
      });

      const data = await res.json();
      if (res.ok) {
        showMsg('formMsg', 'Entry added!', true);
        document.getElementById('company').value = '';
        document.getElementById('whatsapp').value = '';
        document.getElementById('website').value = '';
        document.getElementById('facebook').value = '';
      } else {
        showMsg('formMsg', data.error || 'Failed to add entry', false);
      }

      btn.disabled = false;
      btn.textContent = 'Submit';
    });

    // Number checker
    document.getElementById('checkForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const num = document.getElementById('checkNumber').value.trim();
      const res = await fetch(`/api/check?number=${encodeURIComponent(num)}`);
      const text = await res.text();
      const isMatch = JSON.parse(text) === 'match';
      showMsg('checkMsg', isMatch ? 'Number found in CRM' : 'Number not found', isMatch);
    });

    // View logs
    document.getElementById('viewLogsBtn').addEventListener('click', async () => {
      const res = await fetch('/api/auto-logs');
      const logs = await res.json();
      const content = document.getElementById('logsContent');
      content.textContent = logs.length ? logs.join('\n') : 'No logs yet.';
      document.getElementById('logsPanel').style.display = 'block';
    });

    document.getElementById('closeLogsBtn').addEventListener('click', () => {
      document.getElementById('logsPanel').style.display = 'none';
    });

    // Force check
    document.getElementById('forceCheckBtn').addEventListener('click', async () => {
      const btn = document.getElementById('forceCheckBtn');
      btn.disabled = true;
      btn.textContent = 'Checking...';
      showMsg('forceMsg', 'Triggered force check.', true);
      await fetch('/api/force-check', { method: 'POST' });
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'Force Check / Send Now';
      }, 5000);
    });

    // Templates
    (async function loadTemplates() {
      const res = await fetch('/api/templates');
      const templates = await res.json();
      const container = document.getElementById('templatesContainer');

      Object.entries(templates).forEach(([key, value]) => {
        const label = document.createElement('label');
        label.textContent = key;
        const textarea = document.createElement('textarea');
        textarea.value = value;
        textarea.dataset.type = key;
        container.appendChild(label);
        container.appendChild(textarea);
      });

      const saveBtn = document.createElement('button');
      saveBtn.type = 'button';
      saveBtn.className = 'btn-primary';
      saveBtn.textContent = 'Save Templates';
      saveBtn.style.marginTop = '0.25rem';
      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        const data = {};
        container.querySelectorAll('textarea').forEach((ta) => {
          data[ta.dataset.type] = ta.value;
        });
        const res = await fetch('/api/templates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const result = await res.json();
        if (res.ok) {
          showMsg('templateMsg', 'Templates saved!', true);
        } else {
          showMsg('templateMsg', result.error || 'Failed to save', false);
        }
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Templates';
      });
      container.appendChild(saveBtn);
    })();

    // Auto-Sender Status
    (async function updateAutoStatus() {
      async function refresh() {
        const res = await fetch('/api/auto-status');
        const status = await res.json();
        
        let statusText = '';
        if (status.allowed) {
          statusText = '<span style="color: #10b981;">Active</span>';
        } else {
          statusText = `<span style="color: #f97316;">Paused: ${status.reason}</span>`;
        }
        
        const dailyText = status.dailyMax 
          ? ` | Today: ${status.dailySent}/${status.dailyMax}` 
          : ` | Today: ${status.dailySent}`;
        
        document.getElementById('autoStatus').innerHTML = 'Status: ' + statusText + dailyText;
        
        const statsEl = document.getElementById('dailyStats');
        if (status.dailyMax) {
          const pct = Math.round((status.dailySent / status.dailyMax) * 100);
          statsEl.innerHTML = `Sent: ${status.dailySent} / ${status.dailyMax} (${pct}%)`;
        } else {
          statsEl.innerHTML = `Sent: ${status.dailySent} (unlimited)`;
        }
      }
      
      await refresh();
      setInterval(refresh, 10000);
    })();

    // CSV Importer
    (function initCsvImporter() {
      const runBtn = document.getElementById('runCsvBtn');
      const stopBtn = document.getElementById('stopCsvBtn');
      const csvPanel = document.getElementById('csvPanel');
      const csvOutput = document.getElementById('csvOutput');
      const csvMsg = document.getElementById('csvMsg');
      let eventSource = null;
      let lineSet = new Set();

      function updateButtons(running) {
        runBtn.disabled = running;
        stopBtn.disabled = !running;
        csvPanel.style.display = 'block';
      }

      function appendLine(line) {
        const isStderr = line.includes('[stderr]');
        const span = document.createElement('span');
        span.textContent = line + '\n';
        span.style.color = isStderr ? '#f87171' : '#d4d4d4';
        csvOutput.appendChild(span);
        csvOutput.scrollTop = csvOutput.scrollHeight;
      }

      async function loadStatus() {
        const res = await fetch('/api/run-csv-importer/status');
        const status = await res.json();

        if (status.hasBuffer || status.persisted) {
          csvOutput.innerHTML = '';
          status.output.forEach(line => {
            lineSet.add(line);
            appendLine(line);
          });
          csvPanel.style.display = 'block';
        }

        if (status.running) {
          updateButtons(true);
          connectStream();
        }
      }

      function connectStream() {
        if (eventSource) eventSource.close();

        eventSource = new EventSource('/api/run-csv-importer/stream');

        eventSource.onmessage = (e) => {
          const data = JSON.parse(e.data);

          if (data.type === 'heartbeat') {
            return;
          }

          if (data.type === 'buffer' || data.type === 'persisted') {
            csvOutput.innerHTML = '';
            data.lines.forEach(line => {
              lineSet.add(line);
              appendLine(line);
            });
          } else if (data.type === 'line') {
            if (!lineSet.has(data.line)) {
              lineSet.add(data.line);
              appendLine(data.line);
            }
          } else if (data.type === 'done') {
            updateButtons(false);
            const isSuccess = data.exitCode === 0;
            showMsg('csvMsg', isSuccess ? 'Completed successfully' : `Process failed (exit code: ${data.exitCode})`, isSuccess);
            eventSource.close();
            eventSource = null;
          }
        };

        eventSource.onerror = () => {
          eventSource?.close();
          eventSource = null;
        };
      }

      runBtn.addEventListener('click', async () => {
        lineSet = new Set();
        runBtn.disabled = true;
        updateButtons(true);
        csvOutput.innerHTML = '';
        csvMsg.textContent = '';
        csvMsg.className = 'msg';

        const res = await fetch('/api/run-csv-importer/start', { method: 'POST' });
        const result = await res.json();

        if (!res.ok) {
          showMsg('csvMsg', result.error || 'Failed to start', false);
          updateButtons(false);
          return;
        }

        connectStream();
      });

      stopBtn.addEventListener('click', async () => {
        const res = await fetch('/api/run-csv-importer/stop', { method: 'POST' });
        const result = await res.json();
        if (res.ok) {
          eventSource?.close();
          eventSource = null;
          updateButtons(false);
          showMsg('csvMsg', 'Process stopped', true);
        }
      });

      loadStatus();
    })();
  </script>
</body>
</html>
